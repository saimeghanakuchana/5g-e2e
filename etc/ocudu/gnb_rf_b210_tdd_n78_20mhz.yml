gnb_id: 10

cu_cp:
  amf:
    addr: 10.53.1.2
    bind_addr: 10.53.0.1
    supported_tracking_areas:
      - tac: 1
        plmn_list:
          - plmn: "99999"
            tai_slice_support_list:
              - sst: 1
                sd: 1

ru_sdr:
  device_driver: uhd
  device_args: type=b200
  srate: 23.04
  tx_gain: 70
  rx_gain: 50

cell_cfg:
  dl_arfcn: 629334
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "99999"
  tac: 1
  pci: 1

log:
  filename: /tmp/gnb.log
  all_level: info

metrics:
  autostart_stdout_metrics: true
  enable_log: true
  layers:
    enable_rlc: true
    enable_sched: true
  periodicity:
    du_report_period: 1000
  
pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
